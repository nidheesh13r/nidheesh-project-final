name: Playwright E2E Tests & Xray Integration

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    name: Run Tests & Upload Results
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install dependencies
      run: npm install

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps chromium

    - name: Start Services (Docker)
      run: |
        docker compose -f docker-compose.full.yml up -d --build
        # Give the services a moment to become healthy
        sleep 15

    - name: Run Playwright tests
      run: npx playwright test
      env:
        # Pass secrets if you want the auth tests to run on CI
        E2E_EMAIL: ${{ secrets.E2E_EMAIL }}
        E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
        RUN_AUTH_TESTS: ${{ secrets.E2E_EMAIL != '' && 'true' || 'false' }}

    - name: Upload Test Results to Jira (Xray)
      if: always()
      run: |
        # IMPORTANT: Xray uses region-specific API endpoints for data residency.
        # Change this to match your Jira region:
        # - US: https://xray.cloud.us.xray.app
        # - EU: https://xray.cloud.eu.xray.app
        # - AU: https://xray.cloud.au.xray.app
        
        XRAY_API_BASE="https://xray.cloud.us.xray.app"
        
        echo "Authenticating with Xray ($XRAY_API_BASE)..."
        TOKEN=$(curl -s -H "Content-Type: application/json" -X POST --data "{ \"client_id\": \"${{ secrets.XRAY_CLIENT_ID }}\",\"client_secret\": \"${{ secrets.XRAY_CLIENT_SECRET }}\" }" $XRAY_API_BASE/api/v1/authenticate | tr -d '"')
        
        echo "Uploading JUnit XML to Xray..."
        curl -s -H "Content-Type: text/xml" -X POST -H "Authorization: Bearer $TOKEN" --data @"playwright-report/results.xml" "$XRAY_API_BASE/api/v1/import/execution/junit?projectKey=${{ secrets.JIRA_PROJECT_KEY }}"

    - name: Save HTML Report Artifact
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 15
