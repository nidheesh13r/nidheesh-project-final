name: Playwright E2E Tests & Xray Integration

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    name: Run Tests & Upload Results
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install dependencies
      run: npm install

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps chromium

    - name: Start Services (Docker)
      run: |
        docker compose -f docker-compose.full.yml up -d --build
        # Give the services a moment to become healthy
        sleep 15

    - name: Run Playwright tests
      run: npx playwright test
      env:
        # Pass secrets if you want the auth tests to run on CI
        E2E_EMAIL: ${{ secrets.E2E_EMAIL }}
        E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
        RUN_AUTH_TESTS: ${{ secrets.E2E_EMAIL != '' && 'true' || 'false' }}

    - name: Upload Test Results with Evidence (Xray Multipart)
      if: always()
      run: |
        npm install axios form-data
        node upload-results.js
      env:
        XRAY_CLIENT_ID: ${{ secrets.XRAY_CLIENT_ID }}
        XRAY_CLIENT_SECRET: ${{ secrets.XRAY_CLIENT_SECRET }}
        JIRA_PROJECT_KEY: ${{ secrets.JIRA_PROJECT_KEY }}

    - name: Save HTML Report Artifact
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 15
